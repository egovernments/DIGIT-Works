serviceMaps:
 serviceName: expense Service
 mappings:
  - version: 1.0
    name: bill create
    description: create bill in eg_expense_bill
    fromTopic: expense-bill-create
    queryMaps: 
     - query: INSERT into eg_expense_bill (id, tenantid, localitycode, billdate, duedate, billnumber, totalamount, totalPaidAmount, businessservice, referenceId, fromperiod, toperiod, status, paymentStatus, createdby, createdTime, lastmodifiedby, lastModifiedTime, additionalDetails) values(?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)
       basePath: $.bill
       jsonMaps:

        - jsonPath: $.bill.id

        - jsonPath: $.bill.tenantId

        - jsonPath: $.bill.localityCode

        - jsonPath: $.bill.billDate

        - jsonPath: $.bill.dueDate

        - jsonPath: $.bill.billNumber

        - jsonPath: $.bill.totalAmount

        - jsonPath: $.bill.totalPaidAmount

        - jsonPath: $.bill.businessService

        - jsonPath: $.bill.referenceId

        - jsonPath: $.bill.fromPeriod

        - jsonPath: $.bill.toPeriod

        - jsonPath: $.bill.status

        - jsonPath: $.bill.paymentStatus

        - jsonPath: $.bill.auditDetails.createdBy

        - jsonPath: $.bill.auditDetails.createdTime

        - jsonPath: $.bill.auditDetails.lastModifiedBy

        - jsonPath: $.bill.auditDetails.lastModifiedTime

        - jsonPath: $.bill.additionalDetails
          type: JSON
          dbType: JSONB


     # insert into party from payer of bill
     - query: INSERT into eg_expense_party (id, tenantid, type, identifier, parentId, status, createdby, createdTime, lastmodifiedby, lastModifiedTime) values(?,?,?,?,?,?,?,?,?,?)
       basePath: $.bill.payer
       jsonMaps:
        
        - jsonPath: $.bill.payer.id

        - jsonPath: $.bill.payer.tenantId
          
        - jsonPath: $.bill.payer.type
          
        - jsonPath: $.bill.payer.identifier
          
        - jsonPath: $.bill.id

        - jsonPath: $.bill.payer.status 

        - jsonPath: $.bill.payer.auditDetails.createdBy

        - jsonPath: $.bill.payer.auditDetails.createdTime

        - jsonPath: $.bill.payer.auditDetails.lastModifiedBy

        - jsonPath: $.bill.payer.auditDetails.lastModifiedTime

  - version: 1.0
    name: bill detail create
    description: create bill detail in eg_expense_billdetail
    fromTopic: expense-bill-detail-create
    isAuditEnabled: true
    module: BILL
    objecIdJsonPath: $.billDetail.id
    tenantIdJsonPath: $.billDetail.tenantId
    auditAttributeBasePath: $.billDetail
    queryMaps:
      - query: INSERT into eg_expense_billdetail (id, tenantid, billid, referenceId,
          totalAmount, totalPaidAmount, status, paymentStatus, fromperiod, toperiod,
          workerid, totalattendance, createdby, createdTime, lastModifiedby, lastModifiedTime,
          additionalDetails) values(?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)
        basePath: $.billDetail
        jsonMaps:
          - jsonPath: $.billDetail.id
          - jsonPath: $.billDetail.tenantId
          - jsonPath: $.billDetail.billId
          - jsonPath: $.billDetail.referenceId
          - jsonPath: $.billDetail.totalAmount
          - jsonPath: $.billDetail.totalPaidAmount
          - jsonPath: $.billDetail.status
          - jsonPath: $.billDetail.paymentStatus
          - jsonPath: $.billDetail.fromPeriod
          - jsonPath: $.billDetail.toPeriod
          - jsonPath: $.billDetail.workerId
          - jsonPath: $.billDetail.totalAttendance
          - jsonPath: $.billDetail.auditDetails.createdBy
          - jsonPath: $.billDetail.auditDetails.createdTime
          - jsonPath: $.billDetail.auditDetails.lastModifiedBy
          - jsonPath: $.billDetail.auditDetails.lastModifiedTime
          - jsonPath: $.billDetail.additionalDetails
            type: JSON
            dbType: JSONB
      - query: INSERT into eg_expense_party (id, tenantid, type, identifier, parentId,
          status, paymentprovider, payeename, payeephonenumber, bankaccount, bankcode,
          beneficiarycode, additionalDetails, createdby, createdTime, lastmodifiedby, lastModifiedTime)
          values(?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)
        basePath: $.billDetail.payee
        jsonMaps:
          - jsonPath: $.billDetail.payee.id
          - jsonPath: $.billDetail.payee.tenantId
          - jsonPath: $.billDetail.payee.type
          - jsonPath: $.billDetail.payee.identifier
          - jsonPath: $.billDetail.id
          - jsonPath: $.billDetail.payee.status
          - jsonPath: $.billDetail.payee.paymentProvider
          - jsonPath: $.billDetail.payee.payeeName
          - jsonPath: $.billDetail.payee.payeePhoneNumber
          - jsonPath: $.billDetail.payee.bankAccount
          - jsonPath: $.billDetail.payee.bankCode
          - jsonPath: $.billDetail.payee.beneficiaryCode
          - jsonPath: $.billDetail.payee.additionalDetails
            type: JSON
            dbType: JSONB
          - jsonPath: $.billDetail.payee.auditDetails.createdBy
          - jsonPath: $.billDetail.payee.auditDetails.createdTime
          - jsonPath: $.billDetail.payee.auditDetails.lastModifiedBy
          - jsonPath: $.billDetail.payee.auditDetails.lastModifiedTime
      - query: INSERT into eg_expense_lineitem (id, tenantid, billDetailId, headCode,
          amount, paidAmount, type, status, paymentStatus, islineitempayable, createdby,
          createdTime, lastmodifiedby, lastModifiedTime, additionalDetails) values(?,?,?,?,?,?,?,?,?,false,?,?,?,?,?)
        basePath: $.billDetail.lineItems.*
        jsonMaps:
          - jsonPath: $.billDetail.lineItems.*.id
          - jsonPath: $.billDetail.lineItems.*.tenantId
          - jsonPath: $.billDetail.id
          - jsonPath: $.billDetail.lineItems.*.headCode
          - jsonPath: $.billDetail.lineItems.*.amount
          - jsonPath: $.billDetail.lineItems.*.paidAmount
          - jsonPath: $.billDetail.lineItems.*.type
          - jsonPath: $.billDetail.lineItems.*.status
          - jsonPath: $.billDetail.lineItems.*.paymentStatus
          - jsonPath: $.billDetail.lineItems.*.auditDetails.createdBy
          - jsonPath: $.billDetail.lineItems.*.auditDetails.createdTime
          - jsonPath: $.billDetail.lineItems.*.auditDetails.lastModifiedBy
          - jsonPath: $.billDetail.lineItems.*.auditDetails.lastModifiedTime
          - jsonPath: $.billDetail.lineItems.*.additionalDetails
            type: JSON
            dbType: JSONB
      - query: INSERT into eg_expense_lineitem (id, tenantid, billDetailId, headCode,
          amount, paidAmount, type, status, paymentStatus, islineitempayable, createdby,
          createdTime, lastmodifiedby, lastModifiedTime, additionalDetails) values(?,?,?,?,?,?,?,?,?,true,?,?,?,?,?)
        basePath: $.billDetail.payableLineItems.*
        jsonMaps:
          - jsonPath: $.billDetail.payableLineItems.*.id
          - jsonPath: $.billDetail.payableLineItems.*.tenantId
          - jsonPath: $.billDetail.id
          - jsonPath: $.billDetail.payableLineItems.*.headCode
          - jsonPath: $.billDetail.payableLineItems.*.amount
          - jsonPath: $.billDetail.payableLineItems.*.paidAmount
          - jsonPath: $.billDetail.payableLineItems.*.type
          - jsonPath: $.billDetail.payableLineItems.*.status
          - jsonPath: $.billDetail.payableLineItems.*.paymentStatus
          - jsonPath: $.billDetail.payableLineItems.*.auditDetails.createdBy
          - jsonPath: $.billDetail.payableLineItems.*.auditDetails.createdTime
          - jsonPath: $.billDetail.payableLineItems.*.auditDetails.lastModifiedBy
          - jsonPath: $.billDetail.payableLineItems.*.auditDetails.lastModifiedTime
          - jsonPath: $.billDetail.payableLineItems.*.additionalDetails
            type: JSON
            dbType: JSONB

  - version: 1.0
    name: bill update
    description: update bill in eg_expense_bill
    fromTopic: expense-bill-update
    queryMaps: 
     - query: UPDATE eg_expense_bill SET localitycode=?, billdate=?, duedate=?, totalAmount=?, totalPaidAmount=?, businessservice=?, referenceid=?, fromperiod=?, toperiod=?, status=?, paymentstatus=?, lastmodifiedby=?, lastmodifiedtime=?, additionaldetails=? WHERE id=? AND tenantid=?;
       basePath: $.bill
       jsonMaps:

        - jsonPath: $.bill.localityCode

        - jsonPath: $.bill.billDate

        - jsonPath: $.bill.dueDate

        - jsonPath: $.bill.totalAmount

        - jsonPath: $.bill.totalPaidAmount

        - jsonPath: $.bill.businessService

        - jsonPath: $.bill.referenceId

        - jsonPath: $.bill.fromPeriod

        - jsonPath: $.bill.toPeriod

        - jsonPath: $.bill.status

        - jsonPath: $.bill.paymentStatus

        - jsonPath: $.bill.auditDetails.lastModifiedBy

        - jsonPath: $.bill.auditDetails.lastModifiedTime

        - jsonPath: $.bill.additionalDetails
          type: JSON
          dbType: JSONB

        - jsonPath: $.bill.id

        - jsonPath: $.bill.tenantId

     # update to party from payer of bill
     - query: UPDATE eg_expense_party SET type=?, identifier=?, parentid=?, status=?, lastmodifiedby=?, lastmodifiedtime=? WHERE id=? AND tenantid=?;
       basePath: $.bill
       jsonMaps:
          
        - jsonPath: $.bill.payer.type
          
        - jsonPath: $.bill.payer.identifier
          
        - jsonPath: $.bill.id

        - jsonPath: $.bill.payer.status 

        - jsonPath: $.bill.payer.auditDetails.lastModifiedBy

        - jsonPath: $.bill.payer.auditDetails.lastModifiedTime

        - jsonPath: $.bill.payer.id

        - jsonPath: $.bill.tenantId

