openapi: 3.0.0
info:
  version: 2.0.0
  title: Attendance Service
  description: 'Payments V2: period-aware attendance register search, persisted periodStatuses, Kafka-driven muster status sync, and backward-compatible reviewStatus. Includes v1.3.0 tag support, bulk log operations, and staff/attendee search APIs.'

paths:

  /attendance/v1/_create:
    post:
      tags:
        - Attendance Register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRegisterRequest'
      responses:
        '202':
          description: 'Request to create a register has been accepted.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRegisterResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/v1/_update:
    post:
      tags:
        - Attendance Register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRegisterRequest'
      responses:
        '202':
          description: 'Request to update the register has been accepted.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRegisterResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/v1/_search:
    post:
      tags:
        - Attendance Register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestInfoWrapper'
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: ids
          description: List of register ids
          in: query
          schema:
            type: array
            items:
              type: string
            maxItems: 100
        - name: registerNumber
          description: Custom formatted Register id
          in: query
          schema:
            type: string
        - name: name
          description: Name of the register
          in: query
          schema:
            type: string
        - name: referenceId
          description: Reference Id
          in: query
          schema:
            type: string
        - name: referenceIds
          description: List of Reference Ids
          in: query
          schema:
            type: array
            items:
              type: string
            maxItems: 100
        - name: serviceCode
          description: Service Code
          in: query
          schema:
            type: string
        - name: fromDate
          description: Return registers with any overlap in the given time period
          in: query
          schema:
            type: number
        - name: toDate
          description: Return registers with any overlap in the given time period
          in: query
          schema:
            type: number
        - name: status
          description: Status of the register. This can't be the only query param. It should be paired with some other search param.
          in: query
          schema:
            type: string
            enum:
              - ACTIVE
              - INACTIVE
        - name: attendeeId
          description: Get all the registers where the given Individual was registered.
          in: query
          schema:
            type: string
        - name: staffId
          description: Get all the registers where the given staff was registered.
          in: query
          schema:
            type: string
        - name: staffName
          description: Filter registers by staff name (partial match supported).
          in: query
          schema:
            type: string
        - name: staffTypes
          description: Filter registers by staff role types.
          in: query
          schema:
            type: array
            items:
              type: string
        - name: localityCode
          description: Get all the registers based on the combination of referenceId and localityCode
          in: query
          schema:
            type: string
        - name: campaignNumber
          description: Get all the registers associated with the given campaign number
          in: query
          schema:
            type: string
        - name: isChildrenRequired
          description: Get all the registers including child Project registers
          in: query
          schema:
            type: boolean
        - name: reviewStatus
          description: Get all the registers based on the reviewStatus
          in: query
          schema:
            type: string
        - name: tags
          description: Filter registers by attendee tags (v1.3.0+)
          in: query
          schema:
            type: array
            items:
              type: string
        - name: includeTaggedAttendees
          description: Include tagged attendees in the register results (v1.3.0+, default false)
          in: query
          schema:
            type: boolean
            default: false
        - name: includeStaff
          description: Include staff list in the register results (default true)
          in: query
          schema:
            type: boolean
            default: true
        - name: includeAttendee
          description: Include attendee list in the register results (default true)
          in: query
          schema:
            type: boolean
            default: true
        - name: billingPeriodId
          description: Payments V2 - filter registers overlapping the billing period; use value `AGGREGATE` to map to legacy aggregate billing search.
          in: query
          schema:
            type: string
        - name: registerPeriodStatus
          description: Payments V2 - filter by persisted muster-roll status for the billing period (APPROVED/PENDING).
          in: query
          schema:
            type: string
            enum:
              - APPROVED
              - PENDING
        - name: sortBy
          in: query
          description: sort the search results by fields
          schema:
            type: string
            enum:
              - fromDate
              - toDate
              - lastModifiedTime
        - name: sortOrder
          in: query
          description: sorting order of the search results
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: isServiceCodeExact
          in: query
          description: Whether to match serviceCode exactly (default true). Set to false for prefix/partial match.
          schema:
            type: boolean
            default: true
        - name: limit
          in: query
          description: limit on the results
          schema:
            type: number
        - name: offset
          in: query
          description: offset index of the overall search results
          schema:
            type: number
      responses:
        '200':
          description: 'Search results'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRegisterResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/v1/_delete:
    post:
      tags:
        - Attendance Register
      description: Soft-delete an attendance register.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRegisterDeleteRequest'
      responses:
        '202':
          description: 'Request to delete the register has been accepted.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRegisterDeleteResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/staff/v1/_create:
    post:
      description: Grant permission to a user to access and modify an attendance register. This user can enroll / denroll individuals. They will add attendance entries for the attendees.
      tags:
        - Register Permission
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffPermissionRequest'
      responses:
        '202':
          description: 'Grant permission request accepted'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffPermissionResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/staff/v1/_delete:
    post:
      description: Revoke permission to a user to access and modify an attendance register.
      tags:
        - Register Permission
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffPermissionRequest'
      responses:
        '202':
          description: 'Revoke permission request accepted'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffPermissionResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/staff/v1/_search:
    post:
      description: Search staff members enrolled in attendance registers.
      tags:
        - Register Permission
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: limit
          in: query
          description: Limit on the results
          schema:
            type: integer
        - name: offset
          in: query
          description: Offset index of the overall search results
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffSearchRequest'
      responses:
        '200':
          description: 'Staff search results'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffSearchResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/attendee/v1/_create:
    post:
      description: Users with permission to access the register can enroll attendees.
      tags:
        - Individual Enrollment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendeeCreateRequest'
      responses:
        '202':
          description: 'Attendee Create request accepted'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendeeCreateResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/attendee/v1/_delete:
    post:
      description: Users with permission to access the register can denroll attendees.
      tags:
        - Individual Enrollment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendeeDeleteRequest'
      responses:
        '202':
          description: 'Attendee Delete request accepted'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendeeDeleteResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/attendee/v1/_updateTag:
    post:
      description: Update the tag field for enrolled attendees to support grouping (v1.3.0+). Requires CAMPAIGN_MANAGER role.
      tags:
        - Individual Enrollment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendeeUpdateTagRequest'
      responses:
        '202':
          description: 'Update attendee tag request accepted'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendeeUpdateTagResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/attendee/v1/_search:
    post:
      description: Search attendees enrolled in attendance registers.
      tags:
        - Individual Enrollment
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: limit
          in: query
          description: Limit on the results
          schema:
            type: integer
        - name: offset
          in: query
          description: Offset index of the overall search results
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendeeSearchRequest'
      responses:
        '200':
          description: 'Attendee search results'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendeeSearchResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/log/v1/_create:
    post:
      tags:
        - Attendance Log
      description: It creates a new attendance record.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceLogRequest'
      responses:
        '202':
          description: 'Attendance Records Create Request accepted.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceLogResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/log/v1/bulk/_create:
    post:
      tags:
        - Attendance Log
      description: Bulk creates attendance log entries asynchronously via Kafka. Returns HTTP 202 with ResponseInfo only.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceLogRequest'
      responses:
        '202':
          description: 'Bulk Attendance Records Create Request accepted. Processing asynchronously.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseInfo'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/log/v1/_update:
    post:
      tags:
        - Attendance Log
      description: It updates an attendance record.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceLogRequest'
      responses:
        '202':
          description: 'Attendance Records Update Request accepted.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceLogResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/log/v1/bulk/_update:
    post:
      tags:
        - Attendance Log
      description: Bulk updates attendance log entries asynchronously via Kafka. Returns HTTP 202 with ResponseInfo only.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceLogRequest'
      responses:
        '202':
          description: 'Bulk Attendance Records Update Request accepted. Processing asynchronously.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseInfo'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

  /attendance/log/v1/_search:
    post:
      tags:
        - Attendance Log
      description: >
        Search attendance log entries. Search criteria can be passed either inline in the
        request body (`attendance` field) or as query parameters. Body criteria take precedence.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceLogSearchRequest'
      parameters:
        - $ref: '#/components/parameters/tenantId'
        - name: registerId
          in: query
          description: Id of the register
          schema:
            type: string
        - name: fromTime
          in: query
          description: Starting time from which the attendance needs to be searched
          schema:
            type: number
        - name: toTime
          in: query
          description: End time till which the attendance needs to be searched
          schema:
            type: number
        - name: individualIds
          in: query
          description: List of individual ids
          schema:
            type: array
            items:
              type: string
            maxItems: 100
        - name: ids
          in: query
          description: List of attendance log ids
          schema:
            type: array
            items:
              type: string
            maxItems: 100
        - name: clientReferenceId
          in: query
          description: List of client reference ids
          schema:
            type: array
            items:
              type: string
            maxItems: 100
        - name: status
          in: query
          description: The status of the attendance log.
          schema:
            type: string
            enum:
              - ACTIVE
              - INACTIVE
        - name: sortBy
          in: query
          description: Sort the search results by fields
          schema:
            type: string
            enum:
              - lastModifiedTime
        - name: sortOrder
          in: query
          description: Sorting order of the search results
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: limit
          in: query
          description: Limit on the results
          schema:
            type: number
        - name: offset
          in: query
          description: Offset index of the overall search results
          schema:
            type: number
      responses:
        '200':
          description: 'Complete table of attendance entries.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceLogResponse'
        '400':
          description: Invalid input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorRes'

components:
  schemas:
    AttendanceRegister:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 64e33343-7b4c-4353-9abf-4de8f5bcd732
          description: System generated unique identifier of the register
          readOnly: true
        tenantId:
          type: string
          example: pb.amritsar
          description: Tenant Id of the register
        registerNumber:
          type: string
          example: REG/2022-23/001
          description: System generated id with custom formatting
          readOnly: true
        name:
          type: string
          example: Class-10-E Physics
          description: Name of the register
          maxLength: 140
        referenceId:
          type: string
          example: 64e33343-7b4c-4353-9abf-4de8f5bcd732
          description: Id of the entity to which register is associated. Example ContractId
          maxLength: 256
        serviceCode:
          type: string
          example: WORKS-CONTRACT
          description: Service to which register is associated.
          maxLength: 64
        startDate:
          type: number
          format: timestamp
          example: 1665497225000
          description: Timestamp of the start date in milliseconds
        endDate:
          type: number
          format: timestamp
          example: 1665497271000
          description: Timestamp of the end date in milliseconds. After the end date no modifications will be allowed to the register.
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          description: Stores if the register is active or not. Inactive registers can be archived later.
        isDeleted:
          type: boolean
          description: Soft-delete flag for the register.
          readOnly: true
        staff:
          readOnly: true
          type: array
          maxItems: 500
          items:
            allOf:
              - $ref: '#/components/schemas/StaffPermission'
              - description: 'Entries of the staff members of the register.'
        attendees:
          readOnly: true
          type: array
          maxItems: 5000
          items:
            allOf:
              - $ref: '#/components/schemas/IndividualEntry'
              - description: 'Entries of the attendees of the register.'
        localityCode:
          type: string
          example: HIERARCHYTEST_MO_13_02_01_01_23_LIPIRANI
          description: A reference to the boundary code associated with the attendance register, representing the geographical or administrative area the register is bounded by.
        campaignNumber:
          type: string
          example: CAMP-2026-001
          description: Human-readable campaign number associated with the register.
        reviewStatus:
          type: string
          example: PENDINGFORAPPROVAL
          description: Indicates whether the attendance register has been reviewed or approved
        registerPeriodStatus:
          type: string
          enum:
            - NOT_CREATED
            - PENDING
            - APPROVED
            - REJECTED
            - SENT_BACK
          description: Payments V2 - derived period-level muster-roll status for the billing period. Read-only; populated during search when billingPeriodId is provided.
          readOnly: true
        periodStatuses:
          type: array
          maxItems: 100
          description: Payments V2 - persisted per-period statuses received from muster-roll Kafka events.
          items:
            $ref: '#/components/schemas/RegisterPeriodStatus'
        auditDetails:
          $ref: '#/components/schemas/AuditDetails'
        additionalDetails:
          type: object
          description: Any additional details of the register
      required:
        - tenantId
        - name
        - referenceId
        - serviceCode

    AttendanceRegisterRequest:
      type: object
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        attendanceRegister:
          type: array
          maxItems: 100
          items:
            allOf:
              - $ref: '#/components/schemas/AttendanceRegister'
              - description: 'Entries of the attendance register to be created.'

    AttendanceRegisterResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        attendanceRegister:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/AttendanceRegister'
        totalCount:
          type: integer
          format: int64
          description: Total count of matching registers (for pagination)
          readOnly: true
        statusCount:
          type: object
          description: Count of registers grouped by status (e.g. APPROVED/PENDING counts for V2 billing period search)
          additionalProperties:
            type: integer
            format: int64
          readOnly: true

    AttendanceRegisterDeleteRequest:
      type: object
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        attendanceRegister:
          type: array
          maxItems: 100
          items:
            allOf:
              - $ref: '#/components/schemas/AttendanceRegister'
              - description: 'Entries of the attendance register to be deleted.'

    AttendanceRegisterDeleteResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        attendanceRegister:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/AttendanceRegister'

    RegisterPeriodStatus:
      type: object
      description: Payments V2 - per-period muster-roll status persisted from Kafka events.
      properties:
        periodId:
          type: string
          description: Billing period identifier (links to eg_wms_billing_period.id)
        status:
          type: string
          enum:
            - NOT_CREATED
            - PENDING
            - APPROVED
            - REJECTED
            - SENT_BACK
          description: Muster roll status for this period
        musterRollId:
          type: string
          description: Muster roll identifier (links to eg_wms_muster_roll.id). Null when status is NOT_CREATED.
        lastModifiedTime:
          type: integer
          format: int64
          description: Epoch millis when this status was last updated.
      required:
        - periodId
        - status
        - lastModifiedTime

    IndividualEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 64e33343-7b4c-4353-9abf-4de8f5bcd732
          description: Primary identifier of the enrollment record
          readOnly: true
        registerId:
          type: string
          format: uuid
          example: 32e33343-7b4c-4353-9abf-4de8f5bcd764
          description: This field will not be shown when this object is part of the register object. It is present so that we can reuse this object for enroll and denroll requests.
        individualId:
          type: string
          format: uuid
          example: 2bafdd8d-5673-4690-b3d0-e13d7ac0cf24
          description: Reference from the Individual Registry
        enrollmentDate:
          type: number
          description: The timestamp of the date on which the individual is enrolled onto the register. Defaults to current time.
        denrollmentDate:
          type: number
          description: The timestamp of the date on which the individual is denrolled from the register.
        tag:
          type: string
          description: Tag for grouping attendees (v1.3.0+). Configurable group label assigned to the attendee.
          maxLength: 64
        tenantId:
          type: string
          example: pb.amritsar
          description: Tenant Id
        auditDetails:
          $ref: '#/components/schemas/AuditDetails'
        additionalDetails:
          type: object
          description: Any additional details of the attendee enrollment

    AttendeeCreateRequest:
      type: object
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        attendees:
          type: array
          maxItems: 500
          items:
            allOf:
              - $ref: '#/components/schemas/IndividualEntry'
              - required:
                  - registerId
                  - individualId
                  - enrollmentDate
                  - tenantId

    AttendeeCreateResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        attendees:
          type: array
          maxItems: 500
          items:
            $ref: '#/components/schemas/IndividualEntry'

    AttendeeDeleteRequest:
      type: object
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        attendees:
          type: array
          maxItems: 500
          items:
            allOf:
              - $ref: '#/components/schemas/IndividualEntry'
              - required:
                  - registerId
                  - individualId
                  - denrollmentDate
                  - tenantId

    AttendeeDeleteResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        attendees:
          type: array
          maxItems: 500
          items:
            $ref: '#/components/schemas/IndividualEntry'

    AttendeeUpdateTagRequest:
      type: object
      description: Request to update the tag field for enrolled attendees (v1.3.0+).
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        attendees:
          type: array
          minItems: 1
          maxItems: 500
          items:
            allOf:
              - $ref: '#/components/schemas/IndividualEntry'
              - required:
                  - registerId
                  - individualId
                  - tenantId
                  - tag

    AttendeeUpdateTagResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        attendees:
          type: array
          maxItems: 500
          items:
            $ref: '#/components/schemas/IndividualEntry'

    AttendeeSearchRequest:
      type: object
      description: >
        Request to search attendees. The `attendees` field contains the search criteria.
        `tenantId`, `limit`, and `offset` are passed as query parameters.
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        attendees:
          $ref: '#/components/schemas/AttendeeSearchCriteria'

    AttendeeSearchCriteria:
      type: object
      properties:
        usernames:
          type: array
          items:
            type: string
          description: Filter by individual usernames
        ids:
          type: array
          items:
            type: string
          description: List of attendee enrollment record ids
        individualIds:
          type: array
          items:
            type: string
          description: List of individual ids
        registerIds:
          type: array
          items:
            type: string
          description: List of register ids
        enrollmentDate:
          type: number
          description: Filter by enrollment date (epoch millis)
        denrollmentDate:
          type: number
          description: Filter by denrollment date (epoch millis)
        tags:
          type: array
          items:
            type: string
          description: Filter by attendee tags
        tenantId:
          type: string
          description: Tenant Id

    AttendeeSearchResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        attendees:
          type: array
          maxItems: 500
          items:
            $ref: '#/components/schemas/IndividualEntry'

    StaffPermission:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: System generated unique identifier for the granted permission request
          readOnly: true
        registerId:
          type: string
          description: Identifier of the register. This field will not be shown when this object is part of the register object. It is present so that we can reuse this object for access permission requests.
        userId:
          type: string
          description: Identifier of the user of the system
        tenantId:
          type: string
          format: string
          example: pb.amritsar
          description: Tenant Id to which the staff belongs
        enrollmentDate:
          type: number
          description: The timestamp at which the permission is granted. Set to current time on create; can be updated via _update API.
        denrollmentDate:
          type: number
          description: The timestamp at which the access permission is revoked. Set to current time on delete; can be updated via _update API.
        staffType:
          type: string
          description: Defines the role assigned to a staff member within the attendance register. Roles determine the level of access and responsibilities.
          enum:
            - EDITOR
            - OWNER
            - APPROVER
        auditDetails:
          $ref: '#/components/schemas/AuditDetails'
        additionalDetails:
          type: object
          description: Any additional details of the staff enrollment
      required:
        - registerId
        - userId

    StaffPermissionRequest:
      type: object
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        staff:
          type: array
          maxItems: 100
          items:
            allOf:
              - $ref: '#/components/schemas/StaffPermission'
              - required:
                  - registerId
                  - userId
                  - tenantId

    StaffPermissionResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        staff:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/StaffPermission'

    StaffSearchRequest:
      type: object
      description: >
        Request to search staff members. The `staff` field contains the search criteria.
        `tenantId`, `limit`, and `offset` are passed as query parameters.
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        staff:
          $ref: '#/components/schemas/StaffSearchCriteria'

    StaffSearchCriteria:
      type: object
      properties:
        usernames:
          type: array
          items:
            type: string
          description: Filter by staff usernames
        individualIds:
          type: array
          items:
            type: string
          description: List of individual ids
        registerIds:
          type: array
          items:
            type: string
          description: List of register ids to filter staff
        staffType:
          type: string
          description: Filter by a single staff role type
          enum:
            - EDITOR
            - OWNER
            - APPROVER
        staffTypes:
          type: array
          items:
            type: string
          description: Filter by multiple staff role types
        staffName:
          type: string
          description: Filter by staff name (partial match supported)
        tenantId:
          type: string
          description: Tenant Id

    StaffSearchResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        staff:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/StaffPermission'

    AttendanceLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: System generated unique identifier for the entry
          readOnly: true
        clientReferenceId:
          type: string
          description: Client-generated reference identifier for idempotent operations
        registerId:
          type: string
          description: Unique identifier of the register
        individualId:
          type: string
          format: uuid
          description: The individual for which the attendance is being marked
        tenantId:
          type: string
          example: pb.amritsar
          description: Tenant Id of the register
        time:
          type: number
          format: timestamp
          description: The timestamp at which the event has been recorded.
        type:
          type: string
          description: Configurable in MDMS. [ENTRY/EXIT/...]
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          description: The attendance log of the cancelled event can be marked as inactive.
        documentIds:
          description: Used to store file store ids. Need to verify validity of them using file store service.
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/Document'
        auditDetails:
          $ref: '#/components/schemas/AuditDetails'
        clientAuditDetails:
          $ref: '#/components/schemas/AuditDetails'
        additionalDetails:
          type: object
          description: Any additional details of the attendance log
      required:
        - registerId
        - individualId
        - tenantId
        - time
        - type

    AttendanceLogRequest:
      type: object
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        attendance:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/AttendanceLog'

    AttendanceLogResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        attendance:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/AttendanceLog'

    AttendanceLogSearchRequest:
      type: object
      description: >
        Request to search attendance logs. The `attendance` field contains the search criteria inline.
        Criteria can alternatively be provided as query parameters; body criteria take precedence.
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        attendance:
          $ref: '#/components/schemas/AttendanceLogSearchCriteria'

    AttendanceLogSearchCriteria:
      type: object
      properties:
        ids:
          type: array
          items:
            type: string
          maxItems: 100
          description: List of attendance log ids
        clientReferenceId:
          type: array
          items:
            type: string
          maxItems: 100
          description: List of client reference ids
        tenantId:
          type: string
          description: Tenant Id
        registerId:
          type: string
          description: Unique identifier of the register
        fromTime:
          type: number
          description: Starting epoch timestamp for the search range
        toTime:
          type: number
          description: Ending epoch timestamp for the search range
        individualIds:
          type: array
          items:
            type: string
          maxItems: 100
          description: List of individual ids to filter by
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          description: Status of the attendance log
        limit:
          type: integer
          description: Limit on the results
        offset:
          type: integer
          description: Offset index of the overall search results
        sortBy:
          type: string
          enum:
            - lastModifiedTime
          description: Field to sort results by
        sortOrder:
          type: string
          enum:
            - ASC
            - DESC
          description: Sort direction

    RequestInfoWrapper:
      type: object
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'

    # DIGIT Common Schemas (following eGov standards)
    RequestInfo:
      type: object
      description: RequestInfo should be used to carry meta information about the requests to the server as described in the fields below. All eGov APIs will use requestinfo as a part of the request body to carry this meta information. Some of this information will be returned back from the server as part of the ResponseInfo in the response body to ensure correlation.
      properties:
        apiId:
          type: string
          description: unique API ID
          maxLength: 128
        ver:
          type: string
          description: API version - for HTTP based request this will be same as used in path
          maxLength: 32
        ts:
          type: integer
          format: int64
          description: time in epoch
        action:
          type: string
          description: API action to be performed like _create, _update, _search (denoting POST, PUT, GET) or _determine to get the action based on the request.
          maxLength: 32
        did:
          type: string
          description: Device ID from which the API is called
          maxLength: 1024
        key:
          type: string
          description: API key (API key provided to the caller in case of server to server communication)
          maxLength: 256
        msgId:
          type: string
          description: Unique request message id from the caller
          maxLength: 256
        requesterId:
          type: string
          description: UserId of the user calling
          maxLength: 256
        authToken:
          type: string
          description: Auth token of the authenticated user
        userInfo:
          $ref: '#/components/schemas/User'
        correlationId:
          type: string
          readOnly: true
      required:
        - apiId
        - ver
        - ts
        - msgId
        - action

    User:
      type: object
      description: This is acting ID token of the authenticated user on the server. Any value provided by the clients will be ignored and actual user based on authtoken will be used on the server.
      readOnly: true
      properties:
        tenantId:
          type: string
          description: Unique Identifier of the tenant to which user primarily belongs
        uuid:
          type: string
          description: System Generated User id of the authenticated user.
        userName:
          type: string
          description: Unique user name of the authenticated user
          maxLength: 64
        name:
          type: string
          description: Name of the user
          maxLength: 64
        mobileNumber:
          type: string
          description: mobile number of the authenticated user
          maxLength: 150
        emailId:
          type: string
          description: email address of the authenticated user
          maxLength: 128
        type:
          type: string
          description: Type of the user
          maxLength: 64
        roles:
          type: array
          description: List of all the roles for the user
          items:
            $ref: '#/components/schemas/Role'
      required:
        - tenantId
        - userName
        - roles

    Role:
      type: object
      description: Minimal representation of the role in the system.
      properties:
        tenantId:
          type: string
          description: TenantId for which the role is given
          maxLength: 64
        id:
          type: string
          description: id of the role
          maxLength: 64
        name:
          type: string
          description: Unique name of the role
          maxLength: 64
        description:
          type: string
          description: Description of the role
          maxLength: 256

    ResponseInfo:
      type: object
      description: ResponseInfo should be used to carry metadata information about the response from the server. apiId, ver and msgId in ResponseInfo should always correspond to the same values in respective request's RequestInfo.
      readOnly: true
      properties:
        apiId:
          type: string
          description: unique API ID
          maxLength: 128
        ver:
          type: string
          description: API version
          maxLength: 32
        ts:
          type: integer
          format: int64
          description: response time in epoch
        resMsgId:
          type: string
          description: unique response message id (UUID) - will usually be the correlation id from the server
          maxLength: 256
        msgId:
          type: string
          description: message id of the request
          maxLength: 256
        status:
          type: string
          description: status of request processing - to be enhanced in future to reflect each transactions in workflow
          enum:
            - SUCCESSFUL
            - FAILED

    ErrorRes:
      type: object
      description: All APIs will return ErrorRes in case of failure which will carry ResponseInfo as metadata and Error object as actual representation of error.
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        Errors:
          type: array
          description: Error response array corresponding to Request Object array. In case of single object submission or Software related errors where each object in request/response can not be identified then this array will have only single error.
          items:
            $ref: '#/components/schemas/Error'

    Error:
      type: object
      description: Error object will be returned as a part of response body in conjunction with ResponseInfo as part of ErrorResponse whenever the request processing status in the ResponseInfo is FAILED.
      properties:
        code:
          type: string
          description: Error Code will be module specific error code. All modules should also define standard Error codes.
        message:
          type: string
          description: English locale message of the error
        description:
          type: string
          description: English locale description of the error
        params:
          type: array
          items:
            type: string
      required:
        - code
        - message

    AuditDetails:
      type: object
      description: Collection of audit related fields used by most models
      readOnly: true
      properties:
        createdBy:
          type: string
          description: username (preferred) or userid of the user that created the object
        lastModifiedBy:
          type: string
          description: username (preferred) or userid of the user that last modified the object
        createdTime:
          type: integer
          format: int64
          description: epoch of the time object is created
        lastModifiedTime:
          type: integer
          format: int64
          description: epoch of the time object is last modified

    Document:
      type: object
      description: A Object holds the basic data for a document
      properties:
        id:
          type: string
          description: system id of the Document.
          maxLength: 64
        documentType:
          type: string
          description: Type of document.
          maxLength: 64
        fileStore:
          type: string
          description: File store reference key.
          maxLength: 64
        documentUid:
          type: string
          description: The unique id of the document.
          maxLength: 64
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
          description: Status of the document. Defaults to ACTIVE.
        additionalDetails:
          type: object
          description: Json object to capture any extra information which is not accommodated by model

  parameters:
    tenantId:
      name: tenantId
      in: query
      description: Unique id for a tenant.
      required: true
      schema:
        type: string
        format: varchar
