  /expense-calculator/v1/_calculate:
    post:
      tags:
        - V2 Enhanced Calculate
      summary: Calculate and generate bills (V1 + V2 modes)
      description: |
        Enhanced calculate endpoint that automatically detects V1 or V2 mode.

        **V1 Mode (Backward Compatible):**
        - No billing configuration exists for project
        - Generates single bill for entire project duration
        - Existing behavior preserved 100%

        **V2 Mode (New):**
        - Billing configuration exists for project (ACTIVE status)
        - Generates one bill per billing period
        - Returns multiple bills in response
        - Updates period status after each bill

        **V2 Process Flow:**
        1. Detect billing configuration
        2. Fetch all billing periods
        3. For each PENDING/PROCESSING period:
           - Check if bill already exists (duplicate prevention)
           - Fetch registers overlapping with period
           - Generate period-specific muster rolls (via muster-roll service)
           - Generate bill for period
           - Submit bill to expense service
           - Update period status to BILLED
        4. Return all generated bills

        **Duplicate Prevention:**
        - Bills are tracked per period ID in bill_gen_status table
        - Periods with status=BILLED are skipped
        - Idempotent operation (safe to retry)

      operationId: calculate

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateRequest'
            examples:
              v1ModeRequest:
                summary: V1 mode - No billing config (single bill)
                value:
                  RequestInfo:
                    apiId: expense-calculator-api
                    ver: 1.0
                    ts: 1704067200000
                    msgId: "msg-calc-001"
                    userInfo:
                      uuid: "user-123"
                  Criteria:
                    tenantId: "mz.meghalaya"
                    referenceId: "project-old-123"
                    localityCode: "LOCALITY-001"

              v2ModeRequest:
                summary: V2 mode - With billing config (multiple bills)
                value:
                  RequestInfo:
                    apiId: expense-calculator-api
                    ver: 1.0
                    ts: 1704067200000
                    msgId: "msg-calc-002"
                    userInfo:
                      uuid: "user-456"
                  Criteria:
                    tenantId: "mz.meghalaya"
                    referenceId: "project-123"
                    localityCode: "LOCALITY-001"

      responses:
        '200':
          description: Bills calculated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculateResponse'
              examples:
                v1SingleBill:
                  summary: V1 mode - Single bill generated
                  value:
                    ResponseInfo:
                      apiId: expense-calculator-api
                      ver: 1.0
                      ts: 1704067300000
                      status: "successful"
                    Bills:
                      - id: "bill-v1-001"
                        tenantId: "mz.meghalaya"
                        businessService: "EXPENSE.WAGES"
                        referenceId: "project-old-123"
                        fromPeriod: 1704067200000
                        toPeriod: 1709481600000
                        totalAmount: 250000.00
                        status: "ACTIVE"
                        billDetails:
                          - id: "bd-001"
                            fromPeriod: 1704067200000
                            toPeriod: 1709481600000
                            amount: 250000.00
                        additionalDetails:
                          billingMode: "V1"
                    count: 1
                    message: "V1 mode: Single bill generated for project duration"

                v2MultipleBills:
                  summary: V2 mode - 4 bills generated (one per period)
                  value:
                    ResponseInfo:
                      apiId: expense-calculator-api
                      ver: 1.0
                      ts: 1704067300000
                      status: "successful"
                    Bills:
                      - id: "bill-p1-001"
                        tenantId: "mz.meghalaya"
                        businessService: "EXPENSE.WAGES"
                        referenceId: "project-123"
                        fromPeriod: 1704067200000
                        toPeriod: 1704672000000
                        totalAmount: 50000.00
                        billDetails:
                          - id: "bd-p1-001"
                            fromPeriod: 1704067200000
                            toPeriod: 1704672000000
                            amount: 50000.00
                        additionalDetails:
                          billingType: "INTERMEDIATE"
                          billingPeriodId: "period-001"
                          periodNumber: 1
                          v2Enhanced: true
                          noOfRegisters: 5
                      - id: "bill-p2-002"
                        fromPeriod: 1704672000000
                        toPeriod: 1705276800000
                        totalAmount: 45000.00
                        additionalDetails:
                          billingPeriodId: "period-002"
                          periodNumber: 2
                      - id: "bill-p3-003"
                        fromPeriod: 1705276800000
                        toPeriod: 1705881600000
                        totalAmount: 48000.00
                        additionalDetails:
                          billingPeriodId: "period-003"
                          periodNumber: 3
                      - id: "bill-p4-004"
                        fromPeriod: 1705881600000
                        toPeriod: 1706486400000
                        totalAmount: 52000.00
                        additionalDetails:
                          billingPeriodId: "period-004"
                          periodNumber: 4
                    count: 4
                    message: "V2 mode: Generated 4 bills for 4 billing periods"

                v2PartialBills:
                  summary: V2 mode - 2 new bills (2 already billed)
                  value:
                    ResponseInfo:
                      apiId: expense-calculator-api
                      ver: 1.0
                      ts: 1704067300000
                      status: "successful"
                    Bills:
                      - id: "bill-p3-003"
                        totalAmount: 48000.00
                        additionalDetails:
                          periodNumber: 3
                          status: "NEWLY_GENERATED"
                      - id: "bill-p4-004"
                        totalAmount: 52000.00
                        additionalDetails:
                          periodNumber: 4
                          status: "NEWLY_GENERATED"
                    count: 2
                    message: "V2 mode: Generated 2 bills (periods 1-2 already billed)"

        '400':
          description: Validation or processing errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noRegistersForPeriod:
                  summary: No registers found for period
                  value:
                    Errors:
                      - code: "NO_REGISTERS_FOR_PERIOD"
                        message: "No attendance registers found for period 3. Cannot generate bill."
                        description: "Ensure attendance registers exist with dates overlapping the billing period"

                noMusterRolls:
                  summary: No muster rolls generated
                  value:
                    Errors:
                      - code: "NO_MUSTER_ROLLS"
                        message: "No muster rolls generated for period 2. Cannot generate bill without muster rolls."

                noBillsGenerated:
                  summary: Failed to generate any bills
                  value:
                    Errors:
                      - code: "NO_BILLS_GENERATED"
                        message: "Failed to generate bills for all periods. Please check logs for details."
                        description: "All period processing failed. Review bill_gen_status table for error details"

                billingConfigNotActive:
                  summary: Billing config not active
                  value:
                    Errors:
                      - code: "BILLING_CONFIG_NOT_ACTIVE"
                        message: "BillingConfig must be ACTIVE for intermediate billing. Current status: INACTIVE"

        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                projectNotFound:
                  summary: Project does not exist
                  value:
                    Errors:
                      - code: "PROJECT_NOT_FOUND"
                        message: "Project not found for ID: project-999"

        '500':
          description: Internal errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                musterRollServiceError:
                  summary: Error calling muster-roll service
                  value:
                    Errors:
                      - code: "MUSTER_ROLL_SERVICE_ERROR"
                        message: "Failed to call muster-roll service: Connection timeout"

                expenseServiceError:
                  summary: Error submitting bill to expense service
                  value:
                    Errors:
                      - code: "BILL_SUBMISSION_ERROR"
                        message: "Failed to submit bill for period 2: Internal server error"

components:
  schemas:
    BillingConfigRequest:
      type: object
      required:
        - RequestInfo
        - BillingConfig
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        BillingConfig:
          $ref: '#/components/schemas/BillingConfig'

    BillingConfig:
      type: object
      description: |
        **V2 ONLY**: Billing configuration model (opt-in feature)

        This model is used to enable V2 intermediate billing mode. When a billing configuration
        is created for a project, that project switches from V1 mode (single bill) to V2 mode
        (multiple period-based bills).

        **Backward Compatibility Impact:**
        - Creating a billing config switches project to V2 mode
        - Deactivating config reverts project to V1 mode
        - Projects without billing config remain in V1 mode
        - V1 projects are unaffected by this new feature
      required:
        - tenantId
        - campaignNumber
        - billingFrequency
        - projectStartDate
        - projectEndDate
        - status
      properties:
        id:
          type: string
          format: uuid
          description: |
            **V2 ONLY**: Unique identifier (auto-generated for create)
          example: "bc-uuid-001"
        tenantId:
          type: string
          description: |
            **V2 ONLY**: Tenant ID (required)
          example: "mz.meghalaya"
        projectId:
          type: string
          description: |
            **Deprecated (optional)**: Historical project ID used by V1 implementations.
            Present for backward compatibility; campaignNumber should be used for new configurations.
          example: "project-123"
          nullable: true
        campaignNumber:
          type: string
          description: |
            **V2 ONLY**: Campaign number for which the billing configuration applies.
            All projects under this campaign will share the generated billing periods.
          example: "CMP-2025-0001"
        billingFrequency:
          type: string
          enum: [WEEKLY, BI_WEEKLY, MONTHLY, CUSTOM, END_OF_CAMPAIGN]
          description: |
            **V2 ONLY**: Billing frequency for period generation
            - WEEKLY: 7 days
            - BI_WEEKLY: 14 days
            - MONTHLY: Calendar month
            - CUSTOM: Configurable days
            - END_OF_CAMPAIGN: Single period for entire project
          example: "WEEKLY"
        customFrequencyDays:
          type: integer
          minimum: 3
          description: |
            **V2 ONLY**: Number of days for CUSTOM frequency (required when frequency is CUSTOM)
          example: 10
          nullable: true
        projectStartDate:
          type: integer
          format: int64
          description: |
            **V2 ONLY**: Project start date (epoch ms)
          example: 1704067200000
        projectEndDate:
          type: integer
          format: int64
          description: |
            **V2 ONLY**: Project end date (epoch ms)
          example: 1706745600000
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          description: |
            **V2 ONLY**: Configuration status
            - ACTIVE: V2 mode enabled for project
            - INACTIVE: V2 mode disabled, project uses V1 mode
          example: "ACTIVE"
        periodsGenerated:
          type: integer
          description: |
            **V2 ONLY**: Number of billing periods generated (read-only)
          example: 4
          readOnly: true
        auditDetails:
          $ref: '#/components/schemas/AuditDetails'

    BillingConfigResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        BillingConfig:
          $ref: '#/components/schemas/BillingConfig'
        message:
          type: string
          example: "Billing configuration created successfully"

    BillingConfigSearchRequest:
      type: object
      required:
        - RequestInfo
        - searchCriteria
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        searchCriteria:
          type: object
          required:
            - tenantId
          properties:
            tenantId:
              type: string
              example: "mz.meghalaya"
            projectId:
              type: string
              example: "project-123"
              nullable: true
            campaignNumber:
              type: string
              example: "CMP-2025-0001"
            status:
              type: string
              enum: [ACTIVE, INACTIVE]
              nullable: true

    BillingConfigSearchResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        BillingConfigs:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/BillingConfig'
        count:
          type: integer
          example: 1
        message:
          type: string
          nullable: true

    BillingPeriodSearchRequest:
      type: object
      required:
        - RequestInfo
        - searchCriteria
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        searchCriteria:
          type: object
          required:
            - tenantId
          properties:
            tenantId:
              type: string
            projectId:
              type: string
              nullable: true
            campaignNumber:
              type: string
            periodNumber:
              type: integer
              nullable: true
            status:
              type: string
              enum: [PENDING, PROCESSING, BILLED, FAILED]
              nullable: true

    BillingPeriodSearchResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        BillingPeriods:
          type: array
          items:
            $ref: '#/components/schemas/BillingPeriod'
        count:
          type: integer

    BillingPeriod:
      type: object
      description: |
        **V2 ONLY**: Billing period model (generated from billing configuration)

        Billing periods are automatically created when a billing configuration is created.
        Each period represents a time slice for which bills will be generated.

        **Backward Compatibility:**
        - This is a V2-only feature
        - V1 projects don't have billing periods
        - Periods are automatically linked to muster rolls in V2 mode
      properties:
        id:
          type: string
          format: uuid
          description: |
            **V2 ONLY**: Unique period identifier
          example: "period-uuid-001"
        tenantId:
          type: string
          description: |
            **V2 ONLY**: Tenant ID
          example: "mz.meghalaya"
        projectId:
          type: string
          description: |
            **Deprecated (optional)**: Historical project identifier retained for compatibility.
            Campaign-level processing uses `campaignNumber`.
          example: "project-123"
          nullable: true
        campaignNumber:
          type: string
          description: |
            **V2 ONLY**: Campaign number this period belongs to.
            All projects under the same campaign share these periods.
          example: "CMP-2025-0001"
        billingConfigId:
          type: string
          format: uuid
          description: |
            **V2 ONLY**: Parent billing configuration ID
          example: "bc-uuid-001"
        periodNumber:
          type: integer
          description: |
            **V2 ONLY**: Sequential period number (1, 2, 3, ...)
          example: 1
        periodStartDate:
          type: integer
          format: int64
          description: |
            **V2 ONLY**: Period start date (epoch ms)
          example: 1704067200000
        periodEndDate:
          type: integer
          format: int64
          description: |
            **V2 ONLY**: Period end date (epoch ms)
          example: 1704672000000
        billingFrequency:
          type: string
          enum: [WEEKLY, BI_WEEKLY, MONTHLY, CUSTOM, END_OF_CAMPAIGN]
          description: |
            **V2 ONLY**: Billing frequency (inherited from config)
        status:
          type: string
          enum: [PENDING, PROCESSING, BILLED, FAILED]
          description: |
            **V2 ONLY**: Period billing status
            - PENDING: Not yet billed
            - PROCESSING: Bill generation in progress
            - BILLED: Bill generated successfully
            - FAILED: Bill generation failed
          example: "PENDING"
        billId:
          type: string
          nullable: true
          description: |
            **V2 ONLY**: Bill ID after generation (null if not yet billed)
          example: "bill-uuid-001"
        totalAmount:
          type: number
          format: double
          nullable: true
          description: |
            **V2 ONLY**: Total billed amount for this period (null if not yet billed)
          example: 50000.00
        registerCount:
          type: integer
          nullable: true
          description: |
            **V2 ONLY**: Number of attendance registers in this period
          example: 5
        musterRollCount:
          type: integer
          nullable: true
          description: |
            **V2 ONLY**: Number of muster rolls generated for this period
          example: 5
        auditDetails:
          $ref: '#/components/schemas/AuditDetails'

    BillingPeriodUpdateRequest:
      type: object
      required:
        - RequestInfo
        - BillingPeriod
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        BillingPeriod:
          $ref: '#/components/schemas/BillingPeriod'

    BillingPeriodResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        BillingPeriod:
          $ref: '#/components/schemas/BillingPeriod'

    CalculateRequest:
      type: object
      required:
        - RequestInfo
        - Criteria
      properties:
        RequestInfo:
          $ref: '#/components/schemas/RequestInfo'
        Criteria:
          type: object
          required:
            - tenantId
            - referenceId
            - localityCode
          properties:
            tenantId:
              type: string
              example: "mz.meghalaya"
            referenceId:
              type: string
              description: Project ID
              example: "project-123"
            localityCode:
              type: string
              example: "LOCALITY-001"

    CalculateResponse:
      type: object
      properties:
        ResponseInfo:
          $ref: '#/components/schemas/ResponseInfo'
        Bills:
          type: array
          items:
            $ref: '#/components/schemas/Bill'
        count:
          type: integer
        message:
          type: string
          nullable: true

    Bill:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: |
            **V1 & V2**: Unique bill identifier
        tenantId:
          type: string
          description: |
            **V1 & V2**: Tenant ID (required for all versions)
          example: "mz.meghalaya"
        businessService:
          type: string
          description: |
            **V1 & V2**: Business service code (required for all versions)
          example: "EXPENSE.WAGES"
        referenceId:
          type: string
          description: |
            **V1 & V2**: Project ID reference (required for all versions)
          example: "project-123"
        fromPeriod:
          type: integer
          format: int64
          description: |
            **V1 & V2**: Bill start date (epoch ms)
            - V1: Project start date
            - V2: Billing period start date
          example: 1704067200000
        toPeriod:
          type: integer
          format: int64
          description: |
            **V1 & V2**: Bill end date (epoch ms)
            - V1: Project end date
            - V2: Billing period end date
          example: 1704672000000
        totalAmount:
          type: number
          format: double
          description: |
            **V1 & V2**: Total bill amount (required for all versions)
          example: 50000.00
        status:
          type: string
          description: |
            **V1 & V2**: Bill status
          example: "ACTIVE"
        billDetails:
          type: array
          description: |
            **V1 & V2**: Bill line items (required for all versions)
          items:
            $ref: '#/components/schemas/BillDetail'
        additionalDetails:
          type: object
          description: |
            **V2 Enhancement**: Period metadata (optional, V2 only)

            V1 bills: Empty or minimal metadata
            ```json
            {
              "billingMode": "V1"
            }
            ```

            V2 bills: Rich period metadata
            ```json
            {
              "billingType": "INTERMEDIATE",
              "billingPeriodId": "period-001",
              "periodNumber": 1,
              "billingFrequency": "WEEKLY",
              "noOfRegisters": 5
            }
            ```

            **Backward Compatible**: V1 clients can ignore this field
          nullable: true

    BillDetail:
      type: object
      properties:
        id:
          type: string
        fromPeriod:
          type: integer
          format: int64
        toPeriod:
          type: integer
          format: int64
        amount:
          type: number
          format: double

    RequestInfo:
      type: object
      required:
        - apiId
        - ver
        - ts
        - msgId
        - userInfo
      properties:
        apiId:
          type: string
        ver:
          type: string
        ts:
          type: integer
          format: int64
        action:
          type: string
        msgId:
          type: string
        authToken:
          type: string
        userInfo:
          $ref: '#/components/schemas/UserInfo'

    UserInfo:
      type: object
      required:
        - uuid
      properties:
        uuid:
          type: string
        userName:
          type: string
        name:
          type: string
        type:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'

    Role:
      type: object
      properties:
        code:
          type: string
        name:
          type: string

    ResponseInfo:
      type: object
      properties:
        apiId:
          type: string
        ver:
          type: string
        ts:
          type: integer
          format: int64
        resMsgId:
          type: string
        msgId:
          type: string
        status:
          type: string
          enum: [successful, failed]

    AuditDetails:
      type: object
      properties:
        createdBy:
          type: string
        lastModifiedBy:
          type: string
        createdTime:
          type: integer
          format: int64
        lastModifiedTime:
          type: integer
          format: int64

    ErrorResponse:
      type: object
      required:
        - Errors
      properties:
        Errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        description:
          type: string
        params:
          type: array
          items:
            type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
