openapi: 3.0.0
info:
  title: Health Expense Calculator Service - V2 Intermediate Billing APIs
  version: 2.0.0
  description: |
    # HCM Payments V2 - Health Expense Calculator Service APIs

    This document describes the new V2 APIs added to the Health Expense Calculator Service for
    intermediate billing with billing configurations and period-based bill generation.

    ## Key Features
    - Billing configuration management (WEEKLY, BI_WEEKLY, MONTHLY, CUSTOM, END_OF_CAMPAIGN)
    - Automated billing period generation based on frequency
    - Period-based bill generation (one bill per period)
    - Period-aware PDF/Excel report generation for V2 bills
    - **Automatic V1/V2 mode detection** (based on billing config presence)
    - **100% backward compatibility** with V1 projects

    ## V2 Changes
    - **NEW**: Billing Configuration CRUD operations (5 endpoints)
    - **NEW**: Billing Period search and update (2 endpoints)
    - **ENHANCED**: Calculate endpoint now supports V2 mode (automatic detection)
    - **DATABASE**: New tables for billing config and periods
    - **LOGIC**: Period-aware intermediate billing service

    ## Backward Compatibility

    **V1 Mode (Legacy - No Changes Required)**:
    - Projects without billing configuration
    - Single bill generated for entire project duration
    - All existing V1 behavior preserved
    - No breaking changes to existing functionality
    - Bill response format unchanged

    **V2 Mode (New Features - Automatic)**:
    - Projects with ACTIVE billing configuration
    - Multiple bills generated (one per billing period)
    - Period metadata included in bill additionalDetails
    - Enhanced tracking with billing periods

    **Mode Detection**:
    ```java
    BillingConfig config = getBillingConfig(projectId, tenantId);

    if (config != null && config.isActive()) {
        // V2 Mode: Intermediate billing
        return intermediateBillingService.processIntermediateBilling(...);
    } else {
        // V1 Mode: Regular billing (unchanged)
        return processRegularBillingV1(...);
    }
    ```

    **Coexistence**:
    - V1 and V2 projects run simultaneously in same system
    - No interference between modes
    - Mode determined per-project automatically
    - V1 projects can be migrated to V2 by creating billing config

    ## Helper Utilities

    **BillingVersionHelper** - Java utility class for V1/V2 detection:
    ```java
    @Autowired
    private BillingVersionHelper versionHelper;

    // Detect mode
    String mode = versionHelper.detectBillingMode(billingConfig); // "V1" or "V2"
    boolean isV2 = versionHelper.isV2Mode(billingConfig);

    // Check bill version
    boolean isV2Bill = versionHelper.isV2Bill(bill);

    // Log mode
    versionHelper.logBillingMode(projectId, billingConfig, "CALCULATE");
    ```

    ## API Flow

    **V1 Flow (Legacy)**:
    1. Create project (no billing config)
    2. Call calculate API
    3. System generates single bill for entire duration
    4. Response: 1 bill without period metadata

    **V2 Flow (New)**:
    1. Create project
    2. **Create billing configuration** (enables V2 mode)
    3. System auto-generates billing periods
    4. Call calculate API (same endpoint as V1)
    5. System detects V2 mode and generates multiple bills
    6. Response: N bills with period metadata

    ## Migration Path

    **V1 to V2 Migration**:
    1. Existing V1 projects continue working (no action required)
    2. Create billing configuration via `/_create` endpoint
    3. Next calculate API call automatically uses V2 mode
    4. System generates period-based bills going forward

    **Rollback (V2 to V1)**:
    1. Update billing config status to INACTIVE
    2. Next calculate API call automatically uses V1 mode
    3. System reverts to single bill generation

