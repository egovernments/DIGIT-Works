paths:
  /expense-calculator/v1/billing-config/_create:
    post:
      tags:
        - V2 Billing Configuration
      summary: Create billing configuration
      description: |
        Creates a billing configuration for a project, which enables V2 intermediate billing mode.

        **Key Features:**
        - Defines billing frequency (WEEKLY, BI_WEEKLY, MONTHLY, CUSTOM, END_OF_CAMPAIGN)
        - Automatically generates billing periods based on frequency
        - Validates project dates and frequency settings
        - Prevents duplicate configurations for same project

        **Billing Frequencies:**
        - **WEEKLY**: Bills every 7 days
        - **BI_WEEKLY**: Bills every 14 days
        - **MONTHLY**: Bills every 30 days
        - **CUSTOM**: Bills every N days (min 3 days)
        - **END_OF_CAMPAIGN**: Single bill at project end

        **Automatic Period Generation:**
        - System creates periods from project start to end
        - Each period has sequential number (1, 2, 3, ...)
        - Period dates align with frequency
        - All periods created with status=PENDING

      operationId: createBillingConfig

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingConfigRequest'
            examples:
              weeklyBilling:
                summary: Weekly billing configuration
                value:
                  RequestInfo:
                    apiId: expense-calculator-api
                    ver: 1.0
                    ts: 1704067200000
                    action: create
                    msgId: "msg-bc-001"
                    userInfo:
                      uuid: "user-123"
                  BillingConfig:
                    tenantId: "mz.meghalaya"
                    projectId: "project-123"
                    billingFrequency: "WEEKLY"
                    projectStartDate: 1704067200000
                    projectEndDate: 1706745600000
                    status: "ACTIVE"

              biWeeklyBilling:
                summary: Bi-weekly billing configuration
                value:
                  RequestInfo:
                    apiId: expense-calculator-api
                    ver: 1.0
                    ts: 1704067200000
                    action: create
                    msgId: "msg-bc-002"
                    userInfo:
                      uuid: "user-456"
                  BillingConfig:
                    tenantId: "pb.amritsar"
                    projectId: "project-456"
                    billingFrequency: "BI_WEEKLY"
                    projectStartDate: 1704067200000
                    projectEndDate: 1708905600000
                    status: "ACTIVE"

              customFrequency:
                summary: Custom frequency (10 days)
                value:
                  RequestInfo:
                    apiId: expense-calculator-api
                    ver: 1.0
                    ts: 1704067200000
                    action: create
                    msgId: "msg-bc-003"
                    userInfo:
                      uuid: "user-789"
                  BillingConfig:
                    tenantId: "ka.bangalore"
                    projectId: "project-789"
                    billingFrequency: "CUSTOM"
                    customFrequencyDays: 10
                    projectStartDate: 1704067200000
                    projectEndDate: 1706745600000
                    status: "ACTIVE"

              endOfCampaign:
                summary: End of campaign billing
                value:
                  RequestInfo:
                    apiId: expense-calculator-api
                    ver: 1.0
                    ts: 1704067200000
                    action: create
                    msgId: "msg-bc-004"
                    userInfo:
                      uuid: "user-999"
                  BillingConfig:
                    tenantId: "hr.faridabad"
                    projectId: "project-999"
                    billingFrequency: "END_OF_CAMPAIGN"
                    projectStartDate: 1704067200000
                    projectEndDate: 1709481600000
                    status: "ACTIVE"

      responses:
        '200':
          description: Billing configuration created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingConfigResponse'
              examples:
                weeklyConfigCreated:
                  summary: Weekly config with 4 periods generated
                  value:
                    ResponseInfo:
                      apiId: expense-calculator-api
                      ver: 1.0
                      ts: 1704067300000
                      status: "successful"
                    BillingConfig:
                      id: "bc-uuid-001"
                      tenantId: "mz.meghalaya"
                      projectId: "project-123"
                      billingFrequency: "WEEKLY"
                      projectStartDate: 1704067200000
                      projectEndDate: 1706745600000
                      status: "ACTIVE"
                      periodsGenerated: 4
                      auditDetails:
                        createdBy: "user-123"
                        createdTime: 1704067300000
                    message: "Billing configuration created successfully. 4 billing periods generated."

                customConfigCreated:
                  summary: Custom (10-day) config with 3 periods
                  value:
                    ResponseInfo:
                      apiId: expense-calculator-api
                      ver: 1.0
                      ts: 1704067300000
                      status: "successful"
                    BillingConfig:
                      id: "bc-uuid-002"
                      tenantId: "ka.bangalore"
                      projectId: "project-789"
                      billingFrequency: "CUSTOM"
                      customFrequencyDays: 10
                      projectStartDate: 1704067200000
                      projectEndDate: 1706745600000
                      status: "ACTIVE"
                      periodsGenerated: 3
                    message: "Billing configuration created successfully. 3 billing periods generated."

        '400':
          description: Bad Request - Validation errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingFrequency:
                  summary: Missing billing frequency
                  value:
                    Errors:
                      - code: "BILLING_FREQUENCY_NULL"
                        message: "Billing frequency is required"

                invalidCustomFrequency:
                  summary: Custom frequency without days specified
                  value:
                    Errors:
                      - code: "CUSTOM_FREQUENCY_DAYS_REQUIRED"
                        message: "customFrequencyDays is required when billingFrequency is CUSTOM"

                customFrequencyTooLow:
                  summary: Custom frequency less than 3 days
                  value:
                    Errors:
                      - code: "CUSTOM_FREQUENCY_TOO_LOW"
                        message: "customFrequencyDays must be at least 3 days. Current: 2"

                invalidProjectDates:
                  summary: Invalid project dates
                  value:
                    Errors:
                      - code: "PROJECT_DATES_INVALID"
                        message: "Project start date must be before end date"

                duplicateConfig:
                  summary: Billing config already exists
                  value:
                    Errors:
                      - code: "BILLING_CONFIG_EXISTS"
                        message: "Billing configuration already exists for project: project-123"

        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                projectNotFound:
                  summary: Project does not exist
                  value:
                    Errors:
                      - code: "PROJECT_NOT_FOUND"
                        message: "Project not found for ID: project-999"

  /expense-calculator/v1/billing-config/_update:
    post:
      tags:
        - V2 Billing Configuration
      summary: Update billing configuration
      description: |
        Updates an existing billing configuration. Only certain fields can be updated.

        **Updatable Fields:**
        - status (ACTIVE/INACTIVE)
        - customFrequencyDays (if frequency is CUSTOM)

        **Non-Updatable Fields:**
        - billingFrequency (cannot change after creation)
        - projectStartDate/projectEndDate (locked after creation)
        - Generated periods are not regenerated

      operationId: updateBillingConfig

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingConfigRequest'
            examples:
              deactivateConfig:
                summary: Deactivate billing configuration
                value:
                  RequestInfo:
                    apiId: expense-calculator-api
                    ver: 1.0
                    ts: 1704153600000
                    action: update
                    msgId: "msg-bc-update-001"
                    userInfo:
                      uuid: "user-123"
                  BillingConfig:
                    id: "bc-uuid-001"
                    tenantId: "mz.meghalaya"
                    projectId: "project-123"
                    status: "INACTIVE"

      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingConfigResponse'
              examples:
                configDeactivated:
                  summary: Config deactivated successfully
                  value:
                    ResponseInfo:
                      apiId: expense-calculator-api
                      ver: 1.0
                      ts: 1704153700000
                      status: "successful"
                    BillingConfig:
                      id: "bc-uuid-001"
                      tenantId: "mz.meghalaya"
                      projectId: "project-123"
                      status: "INACTIVE"
                      auditDetails:
                        lastModifiedBy: "user-123"
                        lastModifiedTime: 1704153700000
                    message: "Billing configuration updated successfully"

        '400':
          description: Invalid update request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                configNotFound:
                  summary: Config ID not found
                  value:
                    Errors:
                      - code: "BILLING_CONFIG_NOT_FOUND"
                        message: "Billing configuration not found for ID: bc-uuid-999"

